# nginx server block for the CloudGuard frontend.
# Serves the static SPA bundle, proxies API calls to the backend service, and
# supports client-side routing via a history-mode fallback to index.html.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Don't leak the nginx version in response headers.
    server_tokens off;

    # ── API proxy ────────────────────────────────────────────────────────────
    # All /api/* requests go to the backend container. No trailing slash on
    # proxy_pass, so the full path (/api/v1/...) is forwarded unchanged.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── Static assets ────────────────────────────────────────────────────────
    # Vite fingerprints asset filenames, so they're safe to cache aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── SPA history-mode fallback ──────────────────────────────────────────────
    # Unknown paths (e.g. /settings, /recommendations) are React Router routes,
    # not files — serve index.html and let the client router handle them.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
